<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Form</title>

    <link rel="stylesheet" href="/Enrollment/css/form.css">
    <link rel="stylesheet" href="/Enrollment/css/navbar.css">


</head>
<body>
    
<!-- NAVBAR -->

<nav>

    <div class="logo">

        <a href="/Main/index.html">
            <img src="/Main/image/logo.jpg">
        </a>

    </div>


    <div class="nav-links">

        <a href="/Main/index.html#home">
            Home
        </a>

        <a href="/Main/index.html#about">
            About
        </a>

        <a href="/Main/index.html#gyms">
            Gyms
        </a>

        <a href="/Main/index.html#news">
            News
        </a>

        <a href="/Main/index.html#contact">
            Contact
        </a>


    </div>

</nav>

    <section class="enroll-container" id="enroll">

        <h2 class="section-title">Enrollment Form</h2>

        <form class="form-container" id="enrollmentForm">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="number" id="age" name="age" required>
            </div>

             <div class="input-group">
                <label>Gender</label>
                <select id="gender" name="gender" required>
                    <option value="" selected disabled>Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                     <option>Prefer not to say</option>
                </select>
            </div>           

            <div class="input-group">
                <label>Preferred Gym</label>
                <select id="gym" name="gym" required>
                    <option value="" selected disabled>Select Gym</option>
                    <option>Joaquin Smith JHS(Main)</option>
                    <option>Poliwes</option>
                    <option>Tadiangan</option>
                    <option>San Carlos</option>
                    <option>Bakakeng</option>
                    <option>Victoria</option>
                </select>
            </div>            

            <div class="input-group">
                <label>Belt Level</label>

                <select id="belt" name="belt" required>
                <option value="" selected disabled>Select Belt Level</option>    
                    <option>White</option>
                    <option>Low Yellow</option>
                    <option>High Yellow</option>
                    <option>Low Blue</option>
                    <option>High Blue</option>
                    <option>Low Red</option>
                    <option>High Red</option>
                    <option>Low Brown</option>
                    <option>High Brown</option>
                    <option>Black</option>

                </select>
            </div>

            <div class="input-group">
                <label>Facebook Name</label>
                <input type="text" id="facebook" name="facebook" placeholder="Put Facebook link if Possible">
            </div>

            <div class="input-group">
                <label>Medical Conditions</label> 
                <textarea id="medical" type="text" name="medical" placeholder="Please specify if none put None"></textarea>
            </div>

            <button type="submit" id="submitBtn">
                Submit Enrollment
            </button>

        </form>

    </section>
    
    <div id="popup" class="popup">
    <div class="popup-box">
        <h2 id="popupTitle"></h2>
        <p id="popupMessage"></p>
        
        <button onclick="closePopup()">
            OK
        </button>
    </div>
    </div>

    <script src="/Enrollment/js /enroll.js"></script>

</body>
</html>
