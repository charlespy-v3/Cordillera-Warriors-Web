<!DOCTYPE html>
<html>
<head>
<title>Coach Login</title>
<link rel="stylesheet" href="css/Login.css">
</head>
<body>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<div class="login-container">
    <img src="../Main/image/logo.jpg" class="login-logo" alt="Cordillera Warriors Logo">
    <h2>Cordillera Warriors</h2>
    <br>
    

    <p class="tagline">Cordillera Warriors Management System</p>

    <input type="text" id="username" placeholder="Username">

<div class="password-box">
    <input type="password" id="password" placeholder="Password">

    <i id="togglePassword" class="fa-solid fa-eye toggle-password"></i>
</div>

    <button id="loginBtn" onclick="login()">Login</button>
    <p id="message"></p>
</div>

    <div id="loading" class="loading-overlay" style="display:none;">
    <div class="loader"></div>
    <p>Logging in...</p>

</div>

<script src="cwms js/Login.js"></script>
</body>
</html>
